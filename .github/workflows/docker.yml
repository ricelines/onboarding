name: docker

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/onboarding
  CACHE_SCOPE: onboarding

jobs:
  image:
    name: Build image (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-latest
          - arch: arm64
            runner: ubuntu-24.04-arm

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/${{ matrix.arch }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          provenance: false
          sbom: false
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}-${{ matrix.arch }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
          cache-from: type=gha,scope=${{ env.CACHE_SCOPE }}-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=${{ env.CACHE_SCOPE }}-${{ matrix.arch }}

  merge-manifests:
    name: Create multi-arch tags
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: image

    steps:
      - name: Check out source
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve release tags
        id: release
        shell: bash
        run: ./.github/workflows/resolve-image-version.sh version-series.txt "${IMAGE_NAME}" >> "${GITHUB_OUTPUT}"

      - name: Publish latest tag
        shell: bash
        run: |
          set -euo pipefail
          docker buildx imagetools create \
            -t "${IMAGE_NAME}:latest" \
            "${IMAGE_NAME}:${GITHUB_SHA}-amd64" \
            "${IMAGE_NAME}:${GITHUB_SHA}-arm64"

      - name: Publish release tags
        shell: bash
        run: |
          set -euo pipefail
          while IFS= read -r tag; do
            [ -z "$tag" ] && continue
            docker buildx imagetools create \
              -t "$tag" \
              "${IMAGE_NAME}:${GITHUB_SHA}-amd64" \
              "${IMAGE_NAME}:${GITHUB_SHA}-arm64"
          done <<< "${{ steps.release.outputs.image_tags }}"
